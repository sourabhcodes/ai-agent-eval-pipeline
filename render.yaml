# Render.com Deployment Configuration
# Before deploying:
# 1. Create PostgreSQL database: https://dashboard.render.com/new/database/postgresql
# 2. Create Redis cache: https://dashboard.render.com/new/database/redis
# 3. Copy their connection strings and add to environment variables below

services:
  # FastAPI Web Service
  - type: web
    name: eval-pipeline-api
    dockerfile: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: ${DATABASE_URL}
      - key: REDIS_URL
        value: ${REDIS_URL}
      - key: OPENAI_API_KEY
        value: ${OPENAI_API_KEY}
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO

  # Celery Worker Service
  - type: worker
    name: eval-pipeline-worker
    dockerfile: ./worker.dockerfile
    envVars:
      - key: DATABASE_URL
        value: ${DATABASE_URL}
      - key: REDIS_URL
        value: ${REDIS_URL}
      - key: OPENAI_API_KEY
        value: ${OPENAI_API_KEY}
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO

  # Celery Beat Scheduler
  - type: worker
    name: eval-pipeline-beat
    dockerfile: ./beat.dockerfile
    envVars:
      - key: DATABASE_URL
        value: ${DATABASE_URL}
      - key: REDIS_URL
        value: ${REDIS_URL}
      - key: OPENAI_API_KEY
        value: ${OPENAI_API_KEY}
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
