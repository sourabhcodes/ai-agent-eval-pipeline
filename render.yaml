# Render.com Deployment Configuration
# 
# This Blueprint deploys the FastAPI web service.
# For full deployment, you'll also need to:
# 1. Create PostgreSQL database manually: https://dashboard.render.com/new/database/postgresql
# 2. Create Redis cache manually: https://dashboard.render.com/new/database/redis
# 3. Deploy worker services separately (see DEPLOY.md for instructions)

services:
  # FastAPI Web Service
  - type: web
    name: eval-pipeline-api
    runtime: docker
    envVars:
      - key: DATABASE_URL
        value: ${DATABASE_URL}
      - key: REDIS_URL
        value: ${REDIS_URL}
      - key: OPENAI_API_KEY
        value: ${OPENAI_API_KEY}
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
