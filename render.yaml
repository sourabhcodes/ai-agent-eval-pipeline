# Render.com Deployment Configuration
# 
# This Blueprint deploys the FastAPI web service.
# 
# IMPORTANT: Manual Setup Required
# Before deploying:
# 1. Go to Render Dashboard: https://dashboard.render.com/new/database/postgresql
#    - Create PostgreSQL database
#    - Copy the connection string (database.example.com)
#    - Note the password
# 2. Go to Render Dashboard: https://dashboard.render.com/new/database/redis
#    - Create Redis cache
#    - Copy the connection string (redis://...)
# 3. Get OpenAI API key from https://platform.openai.com/api-keys
# 
# After deploying this Blueprint:
# 1. Go to your FastAPI service in Render
# 2. Click "Environment"
# 3. Add these environment variables with your actual values:
#    - DATABASE_URL: postgresql://user:password@host:5432/dbname
#    - REDIS_URL: redis://default:password@host:10000
#    - OPENAI_API_KEY: sk-your-api-key
#
# For now, set temporary defaults (they'll override at runtime):

services:
  # FastAPI Web Service
  - type: web
    name: eval-pipeline-api
    runtime: docker
    envVars:
      - key: DATABASE_URL
        value: "postgresql://user:password@host:5432/dbname"
      - key: REDIS_URL
        value: "redis://default:password@host:10000"
      - key: OPENAI_API_KEY
        value: "sk-change-me-after-deploy"
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
